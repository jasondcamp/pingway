# pingway reference deployment.
#
# host networking (recommended): true latency measurements and LAN
# reachability. CAP_NET_RAW enables privileged ICMP; omit it and pingway
# falls back to unprivileged UDP ping automatically.
#
# Before first start: mkdir -p data && sudo chown 65532:65532 data
# (the image runs as the distroless "nonroot" user, uid 65532)
services:
  pingway:
    image: ghcr.io/jasondcamp/pingway:latest
    network_mode: host          # recommended: true latency, LAN reachability
    cap_add:
      - NET_RAW                 # privileged ICMP (also needs user: "0");
    # user: "0"                 # uncomment for raw-socket ICMP; default
    #                           # nonroot user uses UDP ping, which works fine
    env_file:
      - path: .env            # optional; see .env.example
        required: false
    volumes:
      - ./data:/data
      # - ./config.yaml:/config/config.yaml:ro   # optional
    environment:
      - TZ=America/New_York
      # - TARGETS=Router:192.168.1.1:1,Cloudflare:1.1.1.1:3,Google:8.8.8.8:3
      # - SPEEDTEST_ENGINE=librespeed
      # - SPEEDTEST_INTERVAL_MINUTES=45
    restart: unless-stopped

# Bridge-mode alternative (works everywhere, including Docker Desktop):
#
#   services:
#     pingway:
#       image: ghcr.io/jasondcamp/pingway:latest
#       ports:
#         - "8080:8080"
#       cap_add: [NET_RAW]
#       volumes: ["./data:/data"]
#       restart: unless-stopped
#
# Caveat: in bridge mode pings originate inside the container network
# namespace, adding a small constant to every RTT and hiding your real
# LAN vantage point; tier-1 results remain useful but absolute numbers
# are slightly inflated.
