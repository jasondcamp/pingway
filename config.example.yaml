# pingway configuration — every field is optional; delete anything you
# don't want to override. Mount at /config/config.yaml (or set CONFIG_FILE).
#
# Precedence: UI edits (DB) > env vars > this file > defaults.
# Set CONFIG_LOCK=true to make env/yaml always win and disable UI edits.

listen: ":8080"

ping:
  interval_ms: 1000
  timeout_ms: 2000

speedtest:
  engine: librespeed        # librespeed | cloudflare | ookla
  interval_minutes: 45      # +/-10% jitter applied
  enabled: true

outage:
  failure_threshold: 5      # consecutive failures -> DOWN
  recovery_threshold: 3     # consecutive successes -> UP

retention:
  raw_hours: 48             # raw ping samples
  rollup_1m_days: 30        # 1-minute rollups (1-hour rollups keep forever)

targets:
  - name: LAN Gateway
    host: 192.168.1.1
    tier: 1                 # 1 = LAN, 2 = ISP side, 3 = internet anchor
  - name: WiFi Hub
    host: 192.168.1.54
    tier: 1
  - name: WAN Gateway       # your public IP: proves the firewall routes LAN->WAN
    host: 203.0.113.7
    tier: 2
    interval_ms: 10000      # probe gently; routers often rate-limit hairpin pings
  - name: ISP First Hop     # first hop past your modem: traceroute 1.1.1.1
    host: 96.120.0.1
    tier: 2
  - name: Cloudflare
    host: 1.1.1.1
    tier: 3
  - name: Google DNS
    host: 8.8.8.8
    tier: 3

# Synthetic call probe (optional): an RTP-shaped UDP stream to reflectors
# OUTSIDE your network. Measures call freezes, jitter, and MOS — see
# docs/call-probe.md. Run ghcr.io/jasondcamp/pingway-reflector on a VPS.
